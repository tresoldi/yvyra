# Your first analysis
# A fictional family inspired by Ancient Greek dialects
# 6 languages, 14 characters (phonological and morphological)

name: first_analysis

taxa:
  - id: koine
    name: Koine
  - id: dorian
    name: Dorian
  - id: aeolic
    name: Aeolic
  - id: arcadian
    name: Arcadian
  - id: ionic
    name: Ionic
  - id: attic
    name: Attic

characters:
  # Shared innovations in Arcadian, Ionic, Attic
  - id: h_loss
    data:
      koine: preserved
      dorian: preserved
      aeolic: preserved
      arcadian: lost
      ionic: lost
      attic: lost
  - id: w_loss
    data:
      koine: preserved
      dorian: preserved
      aeolic: preserved
      arcadian: lost
      ionic: lost
      attic: lost
  - id: long_vowel_shift
    data:
      koine: absent
      dorian: absent
      aeolic: absent
      arcadian: present
      ionic: present
      attic: present
  - id: dat_pl_merger
    data:
      koine: distinct
      dorian: distinct
      aeolic: distinct
      arcadian: merged
      ionic: merged
      attic: merged
  - id: gen_s_ending
    data:
      koine: absent
      dorian: absent
      aeolic: absent
      arcadian: present
      ionic: present
      attic: present
  # Shared innovations in Ionic, Attic only
  - id: vowel_contraction
    data:
      koine: absent
      dorian: absent
      aeolic: absent
      arcadian: absent
      ionic: present
      attic: present
  - id: quantitative_metathesis
    data:
      koine: absent
      dorian: absent
      aeolic: absent
      arcadian: absent
      ionic: present
      attic: present
  - id: psilosis
    data:
      koine: absent
      dorian: absent
      aeolic: absent
      arcadian: absent
      ionic: present
      attic: present
  # Shared innovations in Dorian, Aeolic
  - id: first_aor_part
    data:
      koine: absent
      dorian: present
      aeolic: present
      arcadian: absent
      ionic: absent
      attic: absent
  - id: dat_en_ending
    data:
      koine: absent
      dorian: present
      aeolic: present
      arcadian: absent
      ionic: absent
      attic: absent
  - id: patronymic_suffix
    data:
      koine: absent
      dorian: present
      aeolic: present
      arcadian: absent
      ionic: absent
      attic: absent
  # Innovations shared by all except Koine
  - id: dual_loss
    data:
      koine: preserved
      dorian: lost
      aeolic: lost
      arcadian: lost
      ionic: lost
      attic: lost
  - id: optative_reduction
    data:
      koine: preserved
      dorian: lost
      aeolic: lost
      arcadian: lost
      ionic: lost
      attic: lost
  # Noisy character
  - id: accent_shift
    data:
      koine: conservative
      dorian: innovative
      aeolic: conservative
      arcadian: innovative
      ionic: conservative
      attic: innovative

analysis:
  coding: variable
  seed: 1305
  iterations: 25000
  sample_frequency: 50
