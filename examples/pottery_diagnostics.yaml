# Bronze Age Mediterranean pottery traditions
# 6 traditions, 13 characters, diagnostics for Egyptian+Levantine clade

name: pottery_diagnostics

taxa:
  - id: min
    name: Minoan
  - id: myc
    name: Mycenaean
  - id: cyp
    name: Cypriot
  - id: hit
    name: Hittite
  - id: egy
    name: Egyptian
  - id: lev
    name: Levantine

characters:
  # Aegean shared technology
  - id: slip_technique
    states: [unslipped, slipped]
    data:
      min: slipped
      myc: slipped
      cyp: slipped
      hit: unslipped
      egy: unslipped
      lev: unslipped
  - id: burnishing
    states: [absent, present]
